<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - John Ayarma</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="text-center mb-4">
          <h1 class="display-5 fw-bold text-primary">Task Manager v1.0</h1>
          <p class="text-muted">by John Ayarma</p>
        </div>

        <div class="input-group mb-4">
          <input type="text" id="taskInput" class="form-control" placeholder="Enter a task...">
          <input type="date" id="taskStartDate" class="form-control">
          <button id="addBtn" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Add
          </button>
        </div>

        <ul id="taskList" class="list-group"></ul>
      </div>
    </div>
  </div>

  <div id="viewModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Task Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p><strong>Title:</strong> <span id="viewTaskTitle"></span></p>
          <p><strong>Start Date:</strong> <span id="viewTaskStartDate"></span></p>
          <p><strong>Status:</strong> <span id="viewTaskStatus"></span></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="editTaskTitle" class="form-label">Task Title</label>
            <input type="text" id="editTaskTitle" class="form-control" placeholder="Task title...">
          </div>
          <div class="mb-3">
            <label for="editTaskStartDate" class="form-label">Start Date</label>
            <input type="date" id="editTaskStartDate" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="saveEditBtn" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
